<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PBS 행동 데이터 트래커</title>

    <!-- PWA Settings -->
    <link rel="manifest" href="./manifest.json">
    <meta name="theme-color" content="#6366f1">

    <!-- iOS Specific settings -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="PBS 분석기">
    <link rel="apple-touch-icon" href="./icon-192.png">

    <link rel="stylesheet" href="styles/main.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/lucide-static@0.321.0/font/lucide.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js" defer></script>
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js" defer></script>
</head>

<body>
    <div class="app-container">
        <header>
            <div class="header-main">
                <div class="header-left">
                    <h1>PBS</h1>
                    <span class="header-subtitle">행동데이터트래커</span>
                </div>
                <div id="global-context-header" class="header-right">
                    <!-- 기록 시점 UI (컴팩트) -->
                </div>
                <div id="session-controls">
                    <button class="btn-icon" data-action="export-csv"><i class="lucide-download"></i></button>
                </div>
            </div>
            <div id="sub-header">
                <div id="current-info" onclick="App.switchView('settings-panel')" style="cursor:pointer;">
                    <span id="target-student">학생 로딩 중...</span> · <span id="target-behavior">행동 로딩 중...</span>
                    <span style="font-size:0.7rem; color:var(--primary);"> ▼변경</span>
                </div>
            </div>
        </header>

        <main id="app-content">
            <!-- 1. 기록 패널 -->
            <section id="record-panel" class="view">
                <div class="sub-tabs">
                    <button class="sub-tab active" data-sub="abc" data-action="switch-sub-tab">ABC</button>
                    <button class="sub-tab" data-sub="quick" data-action="switch-sub-tab">간편 기록</button>
                </div>
                <div id="record-content"></div>
            </section>

            <!-- 2. 인사이트 -->
            <section id="insight-panel" class="view hidden">
                <div id="capture-area">
                    <div class="section-title">데이터 리포트</div>
                    <div class="card chart-card">
                        <h3>행동 지형도 (빈도 vs 시간)</h3>
                        <canvas id="mainChart"></canvas>
                    </div>
                    <div class="card chart-card">
                        <h3>ABC 패턴 분석</h3>
                        <div class="chart-container">
                            <canvas id="abcChart"></canvas>
                        </div>
                    </div>
                    <div class="card">
                        <h3>시간대별 히트맵</h3>
                        <div class="heatmap-container" id="heatmap"></div>
                    </div>
                </div>
                <div class="btn-row">
                    <button class="btn btn-secondary" onclick="App.captureReport()">
                        <i class="lucide-image"></i> 이미지 저장
                    </button>
                    <button class="btn btn-ai" onclick="App.generateAIPrompt()">
                        <i class="lucide-sparkles"></i> AI 프롬프트 복사
                    </button>
                </div>
            </section>

            <!-- 3. 관리 -->
            <section id="settings-panel" class="view hidden">
                <div id="settings-content"></div>
            </section>

            <!-- 4. 전체 기록 -->
            <section id="history-panel" class="view hidden">
                <div class="history-header">
                    <div class="section-title">전체 기록</div>
                    <div id="history-student-selector">
                        <!-- Student chips injected by JS -->
                    </div>
                </div>
                <div id="history-list"></div>
            </section>
        </main>

        <nav class="bottom-nav">
            <button class="nav-item active" data-view="record-panel">
                <i class="lucide-edit-3"></i>
                <span>기록</span>
            </button>
            <button class="nav-item" data-view="history-panel">
                <i class="lucide-list"></i>
                <span>전체 기록</span>
            </button>
            <button class="nav-item" data-view="insight-panel">
                <i class="lucide-bar-chart-3"></i>
                <span>인사이트</span>
            </button>
            <button class="nav-item" data-view="settings-panel">
                <i class="lucide-users"></i>
                <span>관리</span>
            </button>
        </nav>
        <div id="modal-container" class="hidden">
            <div class="modal-content">
                <h3 id="modal-title">입력</h3>
                <div id="modal-body"></div>
                <div class="modal-actions">
                    <button id="modal-cancel" class="btn">취소</button>
                    <button id="modal-save" class="btn btn-primary">저장</button>
                </div>
            </div>
        </div>
        <div id="toast"></div>
    </div>

    <script src="js/storage.js"></script>
    <script src="js/app.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                const swPath = window.location.pathname.includes('/PBS-/') ? '/PBS-/sw.js' : './sw.js';
                navigator.serviceWorker.register(swPath).then((registration) => {
                    console.log('ServiceWorker registration successful with scope: ', registration.scope);
                }, (err) => {
                    console.log('ServiceWorker registration failed: ', err);
                });
            });
        }
    </script>
</body>

</html>
